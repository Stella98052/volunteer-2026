<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>慈濟志工培訓出席記錄系統 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e; --ink-light: #2d3561;
  --gold: #c8a96e; --gold-light: #f0deb4;
  --lotus: #8b6f8c; --lotus-light: #e8d8ea;
  --cream: #faf7f0; --cream-dark: #f0ebe0;
  --mist: #e8e4da; --check: #2e6e45; --check-light: #d4ead9;
  --red: #9c3a3a; --border: #c8bfa8; --shadow: rgba(26,26,46,0.12);
  --grey-date: #b0a898; /* unconfirmed preset date colour */
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

/* ── Header ── */
header {
  background: var(--ink); color: var(--gold-light);
  padding: 0 24px; display: flex; align-items: center;
  justify-content: space-between; height: 58px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px var(--shadow);
}
.logo { font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 600; letter-spacing: 2px; color: var(--gold); }
.nav-tabs { display: flex; gap: 4px; }
.nav-tab {
  padding: 6px 15px; border: none; background: transparent;
  color: var(--mist); font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px; cursor: pointer; border-radius: 6px; transition: all 0.2s;
}
.nav-tab:hover { background: rgba(200,169,110,0.15); color: var(--gold); }
.nav-tab.active { background: var(--gold); color: var(--ink); font-weight: 600; }

/* ── Panels ── */
.panel { display: none; padding: 18px 20px; }
.panel.active { display: block; }

.section-title {
  font-family: 'Noto Serif TC', serif; font-size: 19px; font-weight: 600;
  color: var(--ink); margin-bottom: 13px; padding-bottom: 9px;
  border-bottom: 2px solid var(--gold); display: flex; align-items: center; gap: 10px;
}
.section-title span { color: var(--gold); font-size: 12px; font-weight: 400; }

.controls-bar {
  background: white; border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 16px; margin-bottom: 14px; display: flex;
  align-items: center; gap: 12px; flex-wrap: wrap;
  box-shadow: 0 2px 8px var(--shadow);
}
.controls-bar label { font-size: 13px; color: var(--ink-light); font-weight: 500; }
.styled-select, .styled-input {
  padding: 6px 11px; border: 1.5px solid var(--border); border-radius: 7px;
  font-family: 'Noto Sans TC', sans-serif; font-size: 13px;
  background: var(--cream); color: var(--ink); outline: none; transition: border 0.2s;
}
.styled-select:focus, .styled-input:focus { border-color: var(--gold); }
.btn {
  padding: 6px 15px; border: none; border-radius: 7px;
  font-family: 'Noto Sans TC', sans-serif; font-size: 13px;
  cursor: pointer; font-weight: 500; transition: all 0.2s;
}
.btn-primary { background: var(--ink); color: var(--gold-light); }
.btn-primary:hover { background: var(--ink-light); }
.btn-gold { background: var(--gold); color: var(--ink); }
.btn-gold:hover { background: #b8994e; }
.btn-green { background: var(--check); color: white; }
.btn-green:hover { background: #245838; }
.btn-red { background: var(--red); color: white; }
.btn-red:hover { background: #7a2c2c; }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--ink-light); }
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* ── Main table ── */
.table-wrap {
  overflow-x: auto; background: white;
  border-radius: 12px; border: 1px solid var(--border);
  box-shadow: 0 2px 14px var(--shadow);
}
table.main-tbl { border-collapse: collapse; width: 100%; }
table.main-tbl th, table.main-tbl td { border: 1px solid #ddd8cc; }

.col-item {
  position: sticky; left: 0; z-index: 2;
  background: var(--cream-dark);
  font-family: 'Noto Serif TC', serif; font-size: 12px; font-weight: 600;
  padding: 7px 10px; text-align: center; min-width: 100px; width: 100px;
  border-right: 1px solid var(--border); vertical-align: middle; line-height: 1.4;
}
.col-group {
  position: sticky; left: 100px; z-index: 2;
  background: var(--lotus-light);
  font-size: 10px; color: var(--lotus); font-weight: 500;
  padding: 6px 5px; text-align: center; min-width: 62px; width: 62px;
  border-right: 2px solid var(--border); vertical-align: middle; line-height: 1.3;
}
.header-item {
  position: sticky; left: 0; z-index: 3;
  background: var(--ink); color: var(--gold);
  font-family: 'Noto Serif TC', serif; font-size: 13px; font-weight: 700;
  padding: 10px; text-align: center; min-width: 100px;
  border-right: 1px solid rgba(200,169,110,0.3);
}
.header-group {
  position: sticky; left: 100px; z-index: 3;
  background: var(--ink); color: var(--gold-light);
  font-size: 12px; font-weight: 600;
  padding: 10px 5px; text-align: center; min-width: 62px;
  border-right: 2px solid var(--gold);
}
.header-month {
  background: var(--ink); color: var(--gold);
  font-family: 'Noto Serif TC', serif; font-size: 12px; font-weight: 700;
  padding: 10px 6px; text-align: center; min-width: 110px; width: 110px;
  letter-spacing: 1px; border-bottom: 2px solid var(--gold);
}
.course-row:hover .col-item { background: var(--gold-light); }
.course-row.custom-row .col-item { background: var(--lotus-light); color: var(--lotus); }

/* ── Cell ── */
.month-cell {
  min-width: 110px; width: 110px;
  vertical-align: top; padding: 4px 5px;
  background: white;
}

/* ── Date chip: the core UI element ── */
/*
  States:
  .chip            = preset, not yet confirmed  → grey text, dashed border
  .chip.confirmed  = student confirmed attendance → dark text, solid green border + bg
  .chip.custom     = manually added (no preset)  → lotus colour, dotted border
*/
.chip {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 6px; border-radius: 5px; margin-bottom: 3px;
  cursor: pointer; user-select: none;
  transition: all 0.15s; position: relative;
  border: 1.5px dashed #ccc;
  background: #f8f7f4;
}
.chip .chip-date {
  flex: 1; font-size: 11px; line-height: 1.35;
  color: var(--grey-date); font-weight: 400;
  transition: color 0.15s;
}
.chip .chip-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #ddd; flex-shrink: 0;
  transition: background 0.15s;
}
/* Hover on unconfirmed */
.chip:hover {
  border-color: var(--check); background: #f0f7f2;
}
.chip:hover .chip-date { color: var(--check); }
.chip:hover .chip-dot { background: var(--check); }

/* Confirmed state */
.chip.confirmed {
  border: 1.5px solid var(--check);
  background: var(--check-light);
}
.chip.confirmed .chip-date {
  color: var(--ink); font-weight: 600;
}
.chip.confirmed .chip-dot { background: var(--check); }

/* Custom (self-added) unconfirmed */
.chip.custom {
  border: 1.5px dashed var(--lotus);
  background: var(--lotus-light);
}
.chip.custom .chip-date { color: var(--lotus); }
.chip.custom .chip-dot { background: var(--lotus); }
/* Custom confirmed */
.chip.custom.confirmed {
  border: 1.5px solid var(--lotus);
  background: #d8c6d8;
}
.chip.custom.confirmed .chip-date { color: #4a1f4a; font-weight: 600; }

/* Delete button on chip */
.chip-del {
  opacity: 0; font-size: 10px; color: var(--red);
  background: none; border: none; cursor: pointer;
  padding: 0; line-height: 1; flex-shrink: 0;
  transition: opacity 0.12s;
}
.chip:hover .chip-del { opacity: 0.7; }
.chip-del:hover { opacity: 1 !important; }

/* Add custom date row */
.add-row { margin-top: 2px; }
.add-btn {
  width: 100%; background: none; border: 1px dashed #ddd;
  border-radius: 5px; padding: 3px; font-size: 11px; color: #bbb;
  cursor: pointer; transition: all 0.15s; text-align: center;
}
.add-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-light); }

.input-row { display: none; gap: 3px; margin-top: 3px; align-items: center; }
.input-row.open { display: flex; }
.input-row input {
  flex: 1; font-size: 11px; padding: 3px 5px; min-width: 0;
  border: 1px solid var(--border); border-radius: 4px;
  font-family: 'Noto Sans TC', sans-serif; outline: none;
}
.input-row input:focus { border-color: var(--gold); }
.input-row .ok-btn { background: var(--check); color: white; border: none; border-radius: 4px; padding: 3px 7px; font-size: 11px; cursor: pointer; }
.input-row .no-btn { background: var(--mist); color: var(--ink); border: none; border-radius: 4px; padding: 3px 6px; font-size: 11px; cursor: pointer; }

/* ── Legend ── */
.legend {
  display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
  font-size: 12px; color: var(--ink-light); margin-bottom: 12px;
  background: white; border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 14px; box-shadow: 0 1px 4px var(--shadow);
}
.leg-item { display: flex; align-items: center; gap: 6px; }
.leg-chip {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px; border-radius: 4px; font-size: 11px;
}
.leg-chip.unconf { border: 1.5px dashed #ccc; background: #f8f7f4; color: var(--grey-date); }
.leg-chip.conf   { border: 1.5px solid var(--check); background: var(--check-light); color: var(--ink); font-weight: 600; }
.leg-chip.cust   { border: 1.5px dashed var(--lotus); background: var(--lotus-light); color: var(--lotus); }

/* ── Stats ── */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr));
  gap: 10px; margin-bottom: 13px;
}
.stat-card {
  background: white; border: 1px solid var(--border); border-radius: 10px;
  padding: 11px; text-align: center; box-shadow: 0 1px 4px var(--shadow);
}
.stat-num { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 700; color: var(--gold); line-height: 1; margin-bottom: 3px; }
.stat-label { font-size: 11px; color: var(--ink-light); }

/* ── Admin ── */
.admin-card {
  background: white; border: 1px solid var(--border); border-radius: 12px;
  padding: 17px; margin-bottom: 13px; box-shadow: 0 1px 6px var(--shadow);
}
.admin-card h3 {
  font-family: 'Noto Serif TC', serif; font-size: 14px; color: var(--ink);
  margin-bottom: 11px; padding-bottom: 7px; border-bottom: 1px solid var(--mist);
}
.form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 12px; color: var(--ink-light); font-weight: 500; }
.student-list { display: flex; flex-direction: column; gap: 5px; max-height: 270px; overflow-y: auto; }
.student-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 11px; background: var(--cream); border-radius: 7px; border: 1px solid var(--mist);
}
.event-list { display: flex; flex-direction: column; gap: 5px; max-height: 320px; overflow-y: auto; }
.event-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 10px;
  background: var(--cream); border-radius: 7px; border: 1px solid var(--mist); flex-wrap: wrap;
}

/* ── Admin check-in grid ── */
.checkin-grid {
  display: flex; flex-direction: column; gap: 8px;
}
.checkin-month-group { margin-bottom: 6px; }
.checkin-month-label {
  font-family: 'Noto Serif TC', serif; font-size: 13px; font-weight: 600;
  color: var(--ink-light); margin-bottom: 6px; padding: 4px 0;
  border-bottom: 1px solid var(--mist); display: flex; align-items: center; gap: 8px;
}
.checkin-chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0; }
.checkin-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 8px; cursor: pointer;
  transition: all 0.15s; border: 1.5px solid var(--border);
  background: #f8f7f4; user-select: none;
  min-width: 160px;
}
.checkin-chip:hover { border-color: var(--check); background: #f0f7f2; }
.checkin-chip.confirmed { border-color: var(--check); background: var(--check-light); }
.checkin-chip .cc-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #ddd; flex-shrink: 0; transition: background 0.15s;
}
.checkin-chip.confirmed .cc-dot { background: var(--check); }
.checkin-chip .cc-info { flex: 1; }
.checkin-chip .cc-date { font-size: 12px; font-weight: 600; color: var(--grey-date); display: block; }
.checkin-chip.confirmed .cc-date { color: var(--ink); }
.checkin-chip .cc-course { font-size: 10px; color: #bbb; display: block; margin-top: 1px; }
.checkin-chip.confirmed .cc-course { color: var(--check); }
.checkin-chip .cc-check {
  font-size: 16px; color: var(--check); opacity: 0;
  transition: opacity 0.15s; flex-shrink: 0;
}
.checkin-chip.confirmed .cc-check { opacity: 1; }

/* ── Modal ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: white; border-radius: 13px; padding: 24px;
  width: 390px; max-width: 95vw; box-shadow: 0 8px 40px rgba(0,0,0,0.25);
}
.modal h3 { font-family: 'Noto Serif TC', serif; font-size: 16px; margin-bottom: 14px; color: var(--ink); }
.modal .form-group { margin-bottom: 9px; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--ink); color: var(--gold-light);
  padding: 10px 16px; border-radius: 9px; font-size: 13px;
  z-index: 500; opacity: 0; transform: translateY(8px);
  transition: all 0.25s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.empty-state { text-align: center; padding: 40px; color: var(--lotus); font-family: 'Noto Serif TC', serif; font-size: 15px; }

/* ── Print ── */
@media print {
  @page { size: A4 landscape; margin: 8mm; }
  header, .controls-bar, .legend, .btn, .add-row,
  .input-row, .chip-del, #panel-admin, #panel-report { display: none !important; }
  .panel { display: block !important; padding: 0; }
  body { background: white; }
  .table-wrap { box-shadow: none; border: 1px solid #bbb; overflow: visible; }
  table.main-tbl { font-size: 8px; }
  table.main-tbl th, table.main-tbl td { border: 1px solid #bbb; }
  .col-item  { position: static; min-width: 72px; width: 72px; font-size: 9px; padding: 4px 5px; }
  .col-group { position: static; min-width: 48px; width: 48px; font-size: 9px; }
  .header-item, .header-group { position: static; }
  .header-month { min-width: 72px; width: 72px; font-size: 9px; padding: 6px 3px; }
  .month-cell { min-width: 72px; width: 72px; padding: 2px 3px; }
  .chip { padding: 2px 4px; margin-bottom: 2px; border-width: 1px; }
  .chip .chip-date { font-size: 8px; }
  .chip .chip-dot { width: 6px; height: 6px; }
  .chip:not(.confirmed) { display: none; } /* hide unconfirmed in print */
  .print-header { display: block !important; text-align: center; margin-bottom: 10px; }
  .print-header h1 { font-size: 15px; font-family: 'Noto Serif TC', serif; }
  .print-header p  { font-size: 11px; color: #555; margin-top: 3px; }
  .stats-grid { grid-template-columns: repeat(5,1fr); gap: 6px; margin-bottom: 10px; }
}
.print-header { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">慈濟志工培訓出席記錄 2026</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('attendance',this)">📋 出席記錄</button>
    <button class="nav-tab" onclick="switchTab('report',this)">📊 統計報告</button>
    <button class="nav-tab" onclick="switchTab('admin',this)">⚙️ 管理員</button>
  </div>
</header>

<div class="toast" id="toast"></div>

<!-- ══ ATTENDANCE ══ -->
<div class="panel active" id="panel-attendance">
  <div class="section-title">出席記錄 <span>· 灰色日期 = 預定課程，點擊變黑 = 確認出席；可自填額外日期</span></div>
  <div class="controls-bar">
    <label>學員：</label>
    <select class="styled-select" id="student-select" onchange="renderAttendance()">
      <option value="">-- 請選擇學員 --</option>
    </select>
    <button class="btn btn-outline btn-sm" onclick="openAddCourseModal()">＋ 新增個人課程</button>
    <button class="btn btn-gold btn-sm" onclick="window.print()">🖨 列印 A4</button>
  </div>
  <div class="legend">
    <strong style="font-size:12px;color:var(--ink)">說明：</strong>
    <div class="leg-item"><span class="leg-chip unconf"><span style="width:7px;height:7px;border-radius:50%;background:#ddd;display:inline-block"></span> 3/8(日)</span> 預定課程（未確認）</div>
    <div class="leg-item"><span class="leg-chip conf"><span style="width:7px;height:7px;border-radius:50%;background:var(--check);display:inline-block"></span> 3/8(日)</span> 已出席（點擊確認）</div>
    <div class="leg-item"><span class="leg-chip cust"><span style="width:7px;height:7px;border-radius:50%;background:var(--lotus);display:inline-block"></span> 自填</span> 自行新增日期</div>
    <span style="margin-left:auto;font-size:11px;color:#bbb">點擊日期切換出席狀態 · 長按刪除自填日期</span>
  </div>
  <div id="attendance-area"><div class="empty-state">請選擇學員以顯示出席記錄表</div></div>
</div>

<!-- ══ REPORT ══ -->
<div class="panel" id="panel-report">
  <div class="section-title">統計報告 <span>· 僅統計已確認出席項目</span></div>
  <div class="controls-bar">
    <label>學員：</label>
    <select class="styled-select" id="report-student" onchange="renderReport()">
      <option value="">-- 請選擇學員 --</option>
    </select>
    <button class="btn btn-green btn-sm" onclick="window.print()">🖨 列印報告</button>
  </div>
  <div id="report-area"><div class="empty-state">請選擇學員</div></div>
</div>

<!-- ══ ADMIN ══ -->
<div class="panel" id="panel-admin">
  <div class="section-title">管理員設定</div>

  <!-- ── Admin Check-in ── -->
  <div class="admin-card" style="border-color:var(--gold);border-width:2px">
    <h3>✅ 管理員代為報到 <span style="font-size:11px;font-weight:400;color:var(--lotus)">（選課程 → 選日期 → 為學員報到）</span></h3>
    <div class="form-row" style="margin-bottom:14px;align-items:flex-end;gap:14px;flex-wrap:wrap">
      <div class="form-group">
        <label>選擇課程</label>
        <select class="styled-select" id="checkin-course" onchange="renderCheckinDates()" style="width:200px">
          <option value="">-- 請選擇課程 --</option>
        </select>
      </div>
      <div class="form-group">
        <label>選擇日期</label>
        <select class="styled-select" id="checkin-date" onchange="renderCheckinStudents()" style="width:200px">
          <option value="">-- 請先選擇課程 --</option>
        </select>
      </div>
      <div id="checkin-bulk-btns" style="display:none;gap:8px" >
        <button class="btn btn-green btn-sm" onclick="checkInAll()">✓ 全員出席</button>
      </div>
    </div>
    <div id="checkin-grid">
      <div style="color:#bbb;font-size:13px;padding:12px 0">請先選擇課程和日期</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div class="admin-card">
      <h3>👥 學員管理</h3>
      <div class="form-row" style="margin-bottom:11px">
        <div class="form-group">
          <label>姓名</label>
          <input class="styled-input" id="new-student-name" placeholder="學員姓名" style="width:105px">
        </div>
        <div class="form-group">
          <label>帶領組長</label>
          <input class="styled-input" id="new-student-leader" placeholder="組長姓名" style="width:90px">
        </div>
        <div class="form-group">
          <label>組別</label>
          <input class="styled-input" id="new-student-group" placeholder="互愛一協力二" style="width:115px">
        </div>
        <button class="btn btn-primary" onclick="addStudent()">新增</button>
      </div>
      <div class="student-list" id="student-list"></div>
    </div>
    <div class="admin-card">
      <h3>📋 課程列管理 <span style="font-size:11px;font-weight:400;color:var(--lotus)">（新增後所有學員可見）</span></h3>
      <div class="form-row" style="margin-bottom:9px">
        <div class="form-group">
          <label>課程名稱</label>
          <input class="styled-input" id="new-course-name" placeholder="課程名稱" style="width:140px">
        </div>
        <div class="form-group">
          <label>組別</label>

// ════════════════════════════════════════════
// STATE
// State shape:
//   attendance[sid][cid][month] = {
//     presets:  { [key]: confirmed:bool }   ← preset chips
//     custom:   [ { id, label, confirmed } ] ← self-added chips
//   }
// ════════════════════════════════════════════
let state = { students:[], globalCourses:[...DEFAULT_COURSES], attendance:{}, personalCourses:{} };

function loadState() {
  try {
    const s = localStorage.getItem('tzu_chi_2026_v5');
    if (s) {
      state = JSON.parse(s);
      if (!state.globalCourses?.length) state.globalCourses = [...DEFAULT_COURSES];
      if (!state.personalCourses) state.personalCourses = {};
      if (!state.attendance) state.attendance = {};
    }
  } catch(e) {}
}
function saveState() { localStorage.setItem('tzu_chi_2026_v5', JSON.stringify(state)); }
loadState();
if (!state.students.length) { state.students = DEFAULT_STUDENTS.map(s=>({...s})); saveState(); }

function genId() { return 'u'+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

// Cell accessor — always returns { presets:{}, custom:[] }
function cell(sid, cid, m) {
  const a = state.attendance;
  if (!a[sid]) a[sid] = {};
  if (!a[sid][cid]) a[sid][cid] = {};
  if (!a[sid][cid][m]) a[sid][cid][m] = { presets:{}, custom:[] };
  // backward compat: if old array format, reset
  if (Array.isArray(a[sid][cid][m])) a[sid][cid][m] = { presets:{}, custom:[] };
  if (!a[sid][cid][m].presets) a[sid][cid][m].presets = {};
  if (!a[sid][cid][m].custom)  a[sid][cid][m].custom  = [];
  return a[sid][cid][m];
}
function saveCell(sid, cid, m, data) {
  if (!state.attendance[sid]) state.attendance[sid] = {};
  if (!state.attendance[sid][cid]) state.attendance[sid][cid] = {};
  state.attendance[sid][cid][m] = data;
  saveState();
}

// ════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════
function switchTab(tab, el) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  el.classList.add('active');
  if (tab==='attendance') renderAttendance();
  if (tab==='report')     renderReport();
  if (tab==='admin')      renderAdmin();
}

// ════════════════════════════════════════════
// STUDENT SELECTS
// ════════════════════════════════════════════
function syncSelects() {
  ['student-select','report-student','modal-student'].forEach(id=>{
    const sel = document.getElementById(id); if (!sel) return;
    const cur = sel.value;
    sel.innerHTML = '<option value="">-- 請選擇學員 --</option>' +
      state.students.map(s=>`<option value="${s.id}" ${s.id===cur?'selected':''}>${s.name}｜${s.group}｜組長:${s.leader||'—'}</option>`).join('');
  });
  // Populate checkin course dropdown
  const cc = document.getElementById('checkin-course');
  if (cc) {
    const cur = cc.value;
    const coursesWithPresets = state.globalCourses.filter(c => Object.keys(PRESET_DATES[c.id]||{}).length > 0);
    cc.innerHTML = '<option value="">-- 請選擇課程 --</option>' +
      coursesWithPresets.map(c=>`<option value="${c.id}" ${c.id===cur?'selected':''}>${c.name}</option>`).join('');
  }
}

function getCourses(sid) {
  return [...state.globalCourses, ...(state.personalCourses[sid]||[])];
}

// ════════════════════════════════════════════
// RENDER ATTENDANCE
// ════════════════════════════════════════════
function renderAttendance() {
  const sid = document.getElementById('student-select').value;
  const area = document.getElementById('attendance-area');
  if (!sid) { area.innerHTML='<div class="empty-state">請選擇學員以顯示出席記錄表</div>'; return; }

  const student = state.students.find(s=>s.id===sid);
  const courses  = getCourses(sid);

  // Count stats — 3 separate buckets:
  // schedTotal  = total preset chips across all scheduled courses (安排總堂數)
  // schedConf   = confirmed preset chips only (出席堂數，不含自填)
  // personalConf = all confirmed in personal courses + all confirmed custom dates anywhere
  const personalCourseIds = new Set((state.personalCourses[sid]||[]).map(c=>c.id));
  let schedTotal = 0;   // 預定課程總堂數
  let schedConf  = 0;   // 預定課程出席堂數（只算 preset confirmed）
  let personalConf = 0; // 自選課程出席堂數（個人課程列 + 所有列的自填日期）

  courses.forEach(c => {
    const presetDefs = PRESET_DATES[c.id] || {};
    MONTHS.forEach(m => {
      const d = cell(sid, c.id, m);
      const monthPresets = (presetDefs[m] || []);

      if (personalCourseIds.has(c.id)) {
        // Personal course row: everything counts as personal
        personalConf += Object.values(d.presets).filter(Boolean).length;
        personalConf += d.custom.filter(x=>x.confirmed).length;
      } else {
        // Scheduled course row
        schedTotal += monthPresets.length;                                    // total preset slots
        schedConf  += monthPresets.filter(pd => d.presets[pd.key]).length;   // confirmed presets only
        personalConf += d.custom.filter(x=>x.confirmed).length;              // self-added dates → personal bucket
      }
    });
  });

  let html = `
  <div class="print-header">
    <h1>慈濟志工培訓出席記錄表 2026</h1>
    <p>學員：${student.name}（${student.group}）　帶領組長：${student.leader||'—'}　列印日期：${new Date().toLocaleDateString('zh-TW')}</p>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${student.name.replace('師姊','')}</div><div class="stat-label">學員</div></div>
    <div class="stat-card"><div class="stat-num">${student.group}</div><div class="stat-label">組別</div></div>
    <div class="stat-card"><div class="stat-num">${student.leader||'—'}</div><div class="stat-label">帶領組長</div></div>
    <div class="stat-card" style="border-color:#aaa"><div class="stat-num" style="color:#888">${schedTotal}</div><div class="stat-label">預定課程總堂數</div></div>
    <div class="stat-card" style="border-color:var(--check)"><div class="stat-num">${schedConf}</div><div class="stat-label">預定課程出席堂數</div></div>
    <div class="stat-card" style="border-color:var(--lotus)"><div class="stat-num" style="color:var(--lotus)">${personalConf}</div><div class="stat-label">自選課程出席堂數</div></div>
  </div>
  <div class="table-wrap"><table class="main-tbl">
  <thead><tr>
    <th class="header-item">項目</th>
    <th class="header-group">組別</th>
    ${MONTHS.map(m=>`<th class="header-month">${MONTHS_ZH[m]}</th>`).join('')}
  </tr></thead><tbody>`;

  courses.forEach(c => {
    const isPersonal = !!(state.personalCourses[sid]||[]).find(p=>p.id===c.id);
    html += `<tr class="course-row${isPersonal?' custom-row':''}">
      <td class="col-item">${c.name}${c.note?`<br><span style="font-size:9px;color:var(--lotus);font-weight:400">${c.note}</span>`:''}</td>
      <td class="col-group">${c.group||''}</td>`;

    MONTHS.forEach(m => {
      const d = cell(sid, c.id, m);
      const presetDefs = (PRESET_DATES[c.id]||{})[m] || [];

      html += `<td class="month-cell">`;

      // ── Preset chips ──
      presetDefs.forEach(pd => {
        const confirmed = !!d.presets[pd.key];
        const lines = pd.label.split('\n');
        const labelHtml = lines.length>1
          ? `<span style="font-size:10px">${lines[0]}</span><br><span style="font-size:9px;opacity:0.85">${lines[1]}</span>`
          : `<span style="font-size:10px">${lines[0]}</span>`;
        html += `<div class="chip${confirmed?' confirmed':''}"
          onclick="togglePreset('${sid}','${c.id}',${m},'${pd.key}',this)"
          title="${confirmed?'已出席 — 點擊取消':'點擊確認出席'}">
          <span class="chip-dot"></span>
          <span class="chip-date">${labelHtml}</span>
        </div>`;
      });

      // ── Custom chips ──
      (d.custom||[]).forEach((cu, ci) => {
        html += `<div class="chip custom${cu.confirmed?' confirmed':''}"
          onclick="toggleCustom('${sid}','${c.id}',${m},${ci},this)"
          title="${cu.confirmed?'已出席 — 點擊取消':'點擊確認出席'}">
          <span class="chip-dot"></span>
          <span class="chip-date" style="font-size:10px">${cu.label}</span>
          <button class="chip-del" onclick="event.stopPropagation();delCustom('${sid}','${c.id}',${m},${ci})" title="刪除">✕</button>
        </div>`;
      });

      // ── Add custom date ──
      html += `<div class="add-row">
        <button class="add-btn" onclick="openAddRow(this)">＋</button>
        <div class="input-row" data-sid="${sid}" data-cid="${c.id}" data-m="${m}">
          <input type="text" placeholder="如 3/15" maxlength="20">
          <button class="ok-btn" onclick="confirmCustom(this)">✓</button>
          <button class="no-btn" onclick="closeAddRow(this)">✕</button>
        </div>
      </div>`;

      html += `</td>`;
    });
    html += `</tr>`;
  });

  html += `<tr><td colspan="${MONTHS.length+2}" style="padding:10px;text-align:center;background:var(--cream)">
    <button class="btn btn-outline btn-sm" onclick="openAddCourseModal()">＋ 新增個人課程列</button>
  </td></tr></tbody></table></div>`;
  area.innerHTML = html;
}

// ════════════════════════════════════════════
// TOGGLE ACTIONS
// ════════════════════════════════════════════
function togglePreset(sid, cid, m, key, el) {
  const d = cell(sid, cid, m);
  d.presets[key] = !d.presets[key];
  saveCell(sid, cid, m, d);
  el.classList.toggle('confirmed', d.presets[key]);
  // update tooltip
  el.title = d.presets[key] ? '已出席 — 點擊取消' : '點擊確認出席';
  // update stats
  refreshStats(sid);
  showToast(d.presets[key] ? '✓ 已確認出席' : '已取消出席記錄');
}

function toggleCustom(sid, cid, m, idx, el) {
  const d = cell(sid, cid, m);
  if (!d.custom[idx]) return;
  d.custom[idx].confirmed = !d.custom[idx].confirmed;
  saveCell(sid, cid, m, d);
  el.classList.toggle('confirmed', d.custom[idx].confirmed);
  el.title = d.custom[idx].confirmed ? '已出席 — 點擊取消' : '點擊確認出席';
  refreshStats(sid);
  showToast(d.custom[idx].confirmed ? '✓ 已確認出席' : '已取消出席記錄');
}

function delCustom(sid, cid, m, idx) {
  const d = cell(sid, cid, m);
  d.custom.splice(idx, 1);
  saveCell(sid, cid, m, d);
  renderAttendance();
}

// ════════════════════════════════════════════
// CUSTOM DATE INPUT
// ════════════════════════════════════════════
function openAddRow(btn) {
  const row = btn.nextElementSibling;
  row.classList.add('open');
  row.querySelector('input').focus();
  btn.style.display = 'none';
}
function closeAddRow(btn) {
  const row = btn.closest('.input-row');
  row.classList.remove('open');
  row.querySelector('input').value = '';
  row.previousElementSibling.style.display = '';
}
function confirmCustom(btn) {
  const row = btn.closest('.input-row');
  const val = row.querySelector('input').value.trim();
  if (!val) { closeAddRow(btn); return; }
  const sid = row.dataset.sid, cid = row.dataset.cid, m = parseInt(row.dataset.m);
  const d = cell(sid, cid, m);
  d.custom.push({ id: genId(), label: val, confirmed: true });
  saveCell(sid, cid, m, d);
  renderAttendance();
  showToast('✓ 已新增：' + val);
}

// ════════════════════════════════════════════
// REFRESH STATS (without full re-render)
// ════════════════════════════════════════════
function refreshStats(sid) {
  const courses = getCourses(sid);
  const personalCourseIds = new Set((state.personalCourses[sid]||[]).map(c=>c.id));
  let schedTotal = 0, schedConf = 0, personalConf = 0;
  courses.forEach(c => {
    const presetDefs = PRESET_DATES[c.id] || {};
    MONTHS.forEach(m => {
      const d = cell(sid, c.id, m);
      const monthPresets = (presetDefs[m] || []);
      if (personalCourseIds.has(c.id)) {
        personalConf += Object.values(d.presets).filter(Boolean).length;
        personalConf += d.custom.filter(x=>x.confirmed).length;
      } else {
        schedTotal += monthPresets.length;
        schedConf  += monthPresets.filter(pd => d.presets[pd.key]).length;
        personalConf += d.custom.filter(x=>x.confirmed).length;
      }
    });
  });
  const cards = document.querySelectorAll('#attendance-area .stat-num');
  if (cards[3]) cards[3].textContent = schedTotal;
  if (cards[4]) cards[4].textContent = schedConf;
  if (cards[5]) cards[5].textContent = personalConf;
}

// ════════════════════════════════════════════
// REPORT
// ════════════════════════════════════════════
function renderReport() {
  const sid  = document.getElementById('report-student').value;
  const area = document.getElementById('report-area');
  if (!sid) { area.innerHTML='<div class="empty-state">請選擇學員</div>'; return; }

  const student = state.students.find(s=>s.id===sid);
  const courses  = getCourses(sid);
  const personalCourseIds = new Set((state.personalCourses[sid]||[]).map(c=>c.id));
  let schedTotal = 0, schedConf = 0, personalConf = 0;

  const rows = courses.map(c => {
    let presetCount = 0, presetConf = 0, customConf = 0;
    const mdata = {};
    MONTHS.forEach(m => {
      const d = cell(sid, c.id, m);
      const presetDefs = (PRESET_DATES[c.id]||{})[m]||[];
      const confPresets = presetDefs.filter(pd => d.presets[pd.key]).map(pd => pd.label.replace('\n',' '));
      const confCustom  = (d.custom||[]).filter(x=>x.confirmed).map(x=>x.label);

      if (personalCourseIds.has(c.id)) {
        // personal course row — everything counts as personal
        presetConf += confPresets.length;
        customConf += confCustom.length;
      } else {
        presetCount += presetDefs.length;     // total slots
        presetConf  += confPresets.length;    // confirmed presets
        customConf  += confCustom.length;     // self-added → personal bucket
      }

      const all = [...confPresets, ...confCustom];
      if (all.length) mdata[m] = all.join('、');
    });

    if (personalCourseIds.has(c.id)) {
      personalConf += presetConf + customConf;
    } else {
      schedTotal += presetCount;
      schedConf  += presetConf;
      personalConf += customConf;
    }

    return { c, presetConf, customConf, count: presetConf + customConf, mdata, isPersonal: personalCourseIds.has(c.id) };
  });

  let html = `
  <div class="print-header">
    <h1>慈濟志工培訓出席報告 2026</h1>
    <p>學員：${student.name}（${student.group}）　帶領組長：${student.leader||'—'}　列印日期：${new Date().toLocaleDateString('zh-TW')}</p>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${student.name.replace('師姊','')}</div><div class="stat-label">學員</div></div>
    <div class="stat-card"><div class="stat-num">${student.group}</div><div class="stat-label">組別</div></div>
    <div class="stat-card"><div class="stat-num">${student.leader||'—'}</div><div class="stat-label">帶領組長</div></div>
    <div class="stat-card" style="border-color:#aaa"><div class="stat-num" style="color:#888">${schedTotal}</div><div class="stat-label">預定課程總堂數</div></div>
    <div class="stat-card" style="border-color:var(--check)"><div class="stat-num">${schedConf}</div><div class="stat-label">預定課程出席堂數</div></div>
    <div class="stat-card" style="border-color:var(--lotus)"><div class="stat-num" style="color:var(--lotus)">${personalConf}</div><div class="stat-label">自選課程出席堂數</div></div>
  </div>
  <div class="table-wrap"><table class="main-tbl">
  <thead><tr>
    <th class="header-item">課程項目</th>
    <th class="header-group">組別</th>
    ${MONTHS.map(m=>`<th class="header-month">${MONTHS_ZH[m]}</th>`).join('')}
    <th class="header-month" style="background:var(--lotus);color:white;min-width:46px;width:46px">合計</th>
  </tr></thead><tbody>`;

  // ── Scheduled courses (預定課程) ──
  const schedRows = rows.filter(r => !r.isPersonal);
  const personalRows = rows.filter(r => r.isPersonal);

  schedRows.forEach(({c, count, mdata}) => {
    if (count === 0) return;
    html += `<tr class="course-row">
      <td class="col-item" style="background:var(--gold-light)">${c.name}</td>
      <td class="col-group">${c.group||''}</td>`;
    MONTHS.forEach(m => {
      const d = mdata[m];
      html += `<td style="padding:4px 5px;font-size:10px;text-align:center;vertical-align:middle;${d?'background:var(--check-light);color:var(--check)':''}">${d||''}</td>`;
    });
    html += `<td style="text-align:center;font-weight:700;font-size:13px;padding:4px;color:var(--check)">${count}</td></tr>`;
  });

  // Zero-attendance scheduled courses (collapsed)
  const zeroRows = schedRows.filter(r=>r.count===0);
  if (zeroRows.length > 0) {
    html += `<tr><td colspan="${MONTHS.length+3}" style="padding:6px 12px;background:var(--cream);border-top:2px dashed var(--mist)">
      <details style="cursor:pointer">
        <summary style="font-size:12px;color:#bbb;user-select:none">▸ 顯示未出席預定課程（${zeroRows.length} 項）</summary>
        <table style="width:100%;border-collapse:collapse;margin-top:6px">
          ${zeroRows.map(({c})=>`<tr>
            <td style="padding:4px 10px;font-size:12px;color:#bbb;width:105px">${c.name}</td>
            <td style="padding:4px 6px;font-size:10px;color:#ccc;width:62px">${c.group||''}</td>
            ${MONTHS.map(()=>`<td style="padding:4px;min-width:110px;width:110px"></td>`).join('')}
            <td style="text-align:center;color:#ccc;font-size:12px;width:46px">—</td>
          </tr>`).join('')}
        </table>
      </details>
    </td></tr>`;
  }

  // ── Scheduled courses monthly totals row (presets only, not custom) ──
  const monthSchedTotals = {};
  MONTHS.forEach(m => {
    let t = 0;
    schedRows.forEach(({c}) => {
      const d = cell(sid, c.id, m);
      t += (PRESET_DATES[c.id]||{})[m]?.filter(pd=>d.presets[pd.key]).length || 0;
      // custom dates excluded — they go to personal bucket
    });
    monthSchedTotals[m] = t;
  });

  html += `<tr style="background:var(--ink)">
    <td class="col-item" style="background:var(--ink);color:var(--gold);font-family:'Noto Serif TC',serif;font-weight:700;font-size:11px">預定課程<br>總計堂數</td>
    <td class="col-group" style="background:var(--ink);color:var(--gold-light);font-size:10px">全年</td>
    ${MONTHS.map(m=>`<td style="text-align:center;padding:6px 4px;font-weight:700;font-size:13px;${monthSchedTotals[m]?'color:var(--gold)':'color:#444'}">${monthSchedTotals[m]||'—'}</td>`).join('')}
    <td style="text-align:center;padding:6px 4px;font-weight:800;font-size:16px;color:var(--gold)">${schedConf}</td>
  </tr>`;

  // ── Personal / custom courses section ──
  // Always show if there are any personal course rows OR any custom dates anywhere
  const hasPersonalData = personalRows.length > 0 || personalConf > 0;
  if (hasPersonalData) {
    html += `<tr><td colspan="${MONTHS.length+3}" style="padding:8px 14px;background:var(--lotus-light);border-top:3px solid var(--lotus)">
      <span style="font-family:'Noto Serif TC',serif;font-size:13px;color:var(--lotus);font-weight:600">自選課程記錄</span>
      <span style="font-size:11px;color:var(--lotus);margin-left:8px">（不計入預定課程總堂數）</span>
    </td></tr>`;

    personalRows.forEach(({c, count, mdata}) => {
      if (count === 0) return;
      html += `<tr class="course-row custom-row">
        <td class="col-item" style="background:var(--lotus-light);color:var(--lotus)">${c.name}</td>
        <td class="col-group">${c.group||''}</td>`;
      MONTHS.forEach(m => {
        const d = mdata[m];
        html += `<td style="padding:4px 5px;font-size:10px;text-align:center;vertical-align:middle;${d?'background:#e8d0e8;color:var(--lotus)':''}">${d||''}</td>`;
      });
      html += `<td style="text-align:center;font-weight:700;font-size:13px;padding:4px;color:var(--lotus)">${count}</td></tr>`;
    });

    const monthPersonalTotals = {};
    MONTHS.forEach(m => {
      let t = 0;
      // personal course rows (all confirmed)
      personalRows.forEach(({c}) => {
        const d = cell(sid, c.id, m);
        t += (PRESET_DATES[c.id]||{})[m]?.filter(pd=>d.presets[pd.key]).length || 0;
        t += (d.custom||[]).filter(x=>x.confirmed).length;
      });
      // custom (self-added) dates from scheduled course rows also count as personal
      schedRows.forEach(({c}) => {
        const d = cell(sid, c.id, m);
        t += (d.custom||[]).filter(x=>x.confirmed).length;
      });
      monthPersonalTotals[m] = t;
    });

    html += `<tr style="background:#4a1f4a">
      <td class="col-item" style="background:#4a1f4a;color:#e8d8ea;font-family:'Noto Serif TC',serif;font-weight:700;font-size:11px">自選課程<br>總計堂數</td>
      <td class="col-group" style="background:#4a1f4a;color:#d8c6d8;font-size:10px">全年</td>
      ${MONTHS.map(m=>`<td style="text-align:center;padding:6px 4px;font-weight:700;font-size:13px;${monthPersonalTotals[m]?'color:#e8d8ea':'color:#6a4f6a'}">${monthPersonalTotals[m]||'—'}</td>`).join('')}
      <td style="text-align:center;padding:6px 4px;font-weight:800;font-size:16px;color:#e8d8ea">${personalConf}</td>
    </tr>`;
  }
  html += `</tbody></table></div>`;
  area.innerHTML = html;
}

// ════════════════════════════════════════════
// ADMIN CHECK-IN  (課程為主 → 選日期 → 學員報到)
// ════════════════════════════════════════════

// Step 1: course selected → populate date dropdown
function renderCheckinDates() {
  const cid = document.getElementById('checkin-course').value;
  const dateSel = document.getElementById('checkin-date');
  const grid = document.getElementById('checkin-grid');
  const bulkBtns = document.getElementById('checkin-bulk-btns');

  dateSel.innerHTML = '<option value="">-- 請選擇日期 --</option>';
  grid.innerHTML = '<div style="color:#bbb;font-size:13px;padding:12px 0">請選擇日期</div>';
  bulkBtns.style.display = 'none';

  if (!cid) { dateSel.innerHTML = '<option value="">-- 請先選擇課程 --</option>'; return; }

  const presetsByMonth = PRESET_DATES[cid] || {};
  const allPresets = [];
  MONTHS.forEach(m => {
    (presetsByMonth[m] || []).forEach(pd => allPresets.push({ m, pd }));
  });

  if (allPresets.length === 0) {
    dateSel.innerHTML = '<option value="">（此課程無預設日期）</option>';
    return;
  }

  allPresets.forEach(({ m, pd }) => {
    const opt = document.createElement('option');
    opt.value = `${m}__${pd.key}`;
    opt.textContent = pd.label.replace('\n', ' ');
    dateSel.appendChild(opt);
  });
}

// Step 2: date selected → show all students as chips
function renderCheckinStudents() {
  const cid = document.getElementById('checkin-course').value;
  const dateVal = document.getElementById('checkin-date').value;
  const grid = document.getElementById('checkin-grid');
  const bulkBtns = document.getElementById('checkin-bulk-btns');

  if (!cid || !dateVal) {
    grid.innerHTML = '<div style="color:#bbb;font-size:13px;padding:12px 0">請選擇課程和日期</div>';
    bulkBtns.style.display = 'none';
    return;
  }

  const [mStr, pdKey] = dateVal.split('__');
  const m = parseInt(mStr);
  const presetDef = (PRESET_DATES[cid]||{})[m]?.find(pd => pd.key === pdKey);
  if (!presetDef) return;

  bulkBtns.style.display = 'flex';

  const confirmedCount = state.students.filter(s => !!(cell(s.id, cid, m).presets[pdKey])).length;

  let html = `
  <div style="margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <span style="font-family:'Noto Serif TC',serif;font-size:14px;font-weight:600;color:var(--ink)">
      ${presetDef.label.replace('\n',' ')}
    </span>
    <span style="font-size:12px;color:var(--check);font-weight:500">
      已報到 ${confirmedCount} / ${state.students.length} 人
    </span>
  </div>
  <div class="checkin-chips">`;

  state.students.forEach(s => {
    const confirmed = !!(cell(s.id, cid, m).presets[pdKey]);
    html += `<div class="checkin-chip${confirmed?' confirmed':''}"
      onclick="toggleCheckinStudent('${s.id}','${cid}',${m},'${pdKey}',this)">
      <span class="cc-dot"></span>
      <span class="cc-info">
        <span class="cc-date" style="font-size:13px">${s.name.replace('師姊','')}<span style="font-size:10px;font-weight:400;color:inherit;opacity:0.7">師姊</span></span>
        <span class="cc-course">${s.group} ｜ 組長：${s.leader||'—'}</span>
      </span>
      <span class="cc-check">✓</span>
    </div>`;
  });

  html += `</div>`;
  grid.innerHTML = html;
}

function toggleCheckinStudent(sid, cid, m, key, el) {
  const d = cell(sid, cid, m);
  d.presets[key] = !d.presets[key];
  saveCell(sid, cid, m, d);
  el.classList.toggle('confirmed', d.presets[key]);
  showToast(d.presets[key] ? `✓ ${state.students.find(s=>s.id===sid)?.name} 已報到` : '已取消報到');
  // update count
  const cid2 = document.getElementById('checkin-course').value;
  const dateVal = document.getElementById('checkin-date').value;
  if (cid2 && dateVal) {
    const [mStr, pdKey] = dateVal.split('__');
    const confirmedCount = state.students.filter(s => !!(cell(s.id, cid2, parseInt(mStr)).presets[pdKey])).length;
    const countEl = document.querySelector('#checkin-grid span[style*="check"]');
    if (countEl) countEl.textContent = `已報到 ${confirmedCount} / ${state.students.length} 人`;
  }
}

function checkInAll() {
  const cid = document.getElementById('checkin-course').value;
  const dateVal = document.getElementById('checkin-date').value;
  if (!cid || !dateVal) return;
  const [mStr, pdKey] = dateVal.split('__');
  const m = parseInt(mStr);
  state.students.forEach(s => {
    const d = cell(s.id, cid, m);
    d.presets[pdKey] = true;
    saveCell(s.id, cid, m, d);
  });
  renderCheckinStudents();
  showToast(`✓ 已為全體 ${state.students.length} 位學員報到`);
}

// ════════════════════════════════════════════
// ADMIN
// ════════════════════════════════════════════
function renderAdmin() { syncSelects(); renderStudentList(); renderCourseList(); renderCheckinDates(); }

function renderStudentList() {
  const list = document.getElementById('student-list');
  if (!state.students.length) { list.innerHTML='<div style="text-align:center;color:var(--lotus);padding:12px;font-size:13px">尚未新增學員</div>'; return; }
  list.innerHTML = state.students.map(s=>`
    <div class="student-item">
      <div><span style="font-weight:600">${s.name}</span>
      <span style="font-size:11px;color:var(--lotus)"> ｜ ${s.group} ｜ 組長：${s.leader||'—'}</span></div>
      <button class="btn btn-red btn-sm" onclick="removeStudent('${s.id}')">移除</button>
    </div>`).join('');
}
function addStudent() {
  const name   = document.getElementById('new-student-name').value.trim();
  const group  = document.getElementById('new-student-group').value.trim();
  const leader = document.getElementById('new-student-leader').value.trim();
  if (!name) { showToast('請輸入學員姓名'); return; }
  state.students.push({ id:genId(), name, group:group||'未分組', leader:leader||'' });
  saveState();
  ['new-student-name','new-student-group','new-student-leader'].forEach(id=>document.getElementById(id).value='');
  renderStudentList(); syncSelects();
  showToast('已新增：'+name);
}
function removeStudent(id) {
  if (!confirm('確定移除此學員及所有出席記錄？')) return;
  state.students = state.students.filter(s=>s.id!==id);
  delete state.attendance[id]; delete state.personalCourses[id];
  saveState(); renderStudentList(); syncSelects();
  showToast('已移除學員');
}

function renderCourseList() {
  const list = document.getElementById('course-list');
  const defIds = new Set(DEFAULT_COURSES.map(d=>d.id));
  list.innerHTML = state.globalCourses.map(c=>`
    <div class="event-item">
      <span style="font-weight:500;flex:1;font-size:13px">${c.name}</span>
      <span style="font-size:11px;color:var(--lotus)">${c.group||''}</span>
      ${defIds.has(c.id)
        ? '<span style="font-size:10px;color:#bbb;padding:2px 6px">預設</span>'
        : `<button class="btn btn-red btn-sm" onclick="removeGlobalCourse('${c.id}')">✕</button>`}
    </div>`).join('');
}
function addGlobalCourse() {
  const name  = document.getElementById('new-course-name').value.trim();
  const group = document.getElementById('new-course-group').value.trim();
  if (!name) { showToast('請輸入課程名稱'); return; }
  state.globalCourses.push({ id:genId(), name, group:group||'' });
  saveState(); renderCourseList();
  document.getElementById('new-course-name').value='';
  document.getElementById('new-course-group').value='';
  showToast('已新增課程：'+name);
}
function removeGlobalCourse(id) {
  state.globalCourses = state.globalCourses.filter(c=>c.id!==id);
  saveState(); renderCourseList();
  showToast('已移除課程');
}

// ════════════════════════════════════════════
// PERSONAL COURSE MODAL
// ════════════════════════════════════════════
function openAddCourseModal() {
  syncSelects();
  const cur = document.getElementById('student-select').value;
  if (cur) document.getElementById('modal-student').value = cur;
  document.getElementById('modal-add-course').classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function addPersonalCourse() {
  const sid   = document.getElementById('modal-student').value;
  const name  = document.getElementById('modal-course-name').value.trim();
  const group = document.getElementById('modal-course-group').value.trim();
  if (!sid || !name) { showToast('請填寫所有欄位'); return; }
  if (!state.personalCourses[sid]) state.personalCourses[sid] = [];
  state.personalCourses[sid].push({ id:genId(), name, group:group||'個人' });
  saveState();
  closeModal('modal-add-course');
  document.getElementById('modal-course-name').value='';
  document.getElementById('modal-course-group').value='';
  renderAttendance();
  showToast('已新增個人課程：'+name);
}

// ════════════════════════════════════════════
// DATA MANAGEMENT
// ════════════════════════════════════════════
function exportData() {
  const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'tzu_chi_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); showToast('已匯出備份');
}
function importData(ev) {
  const file = ev.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      state = JSON.parse(e.target.result);
      saveState(); syncSelects(); renderAdmin(); renderAttendance();
      showToast('匯入成功');
    } catch { showToast('匯入失敗，請確認檔案'); }
  };
  reader.readAsText(file);
}
function clearAll() {
  if (!confirm('確定清除所有資料？無法復原！')) return;
  state = { students:[], globalCourses:[...DEFAULT_COURSES], attendance:{}, personalCourses:{} };
  saveState(); syncSelects(); renderAdmin(); renderAttendance();
  showToast('已清除所有資料');
}

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 2000);
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
syncSelects();
renderAdmin();
</script>
